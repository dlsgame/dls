<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0f1a">
    <title>DLS26 | Home</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        body { background-color: #0a0f1a; font-family: 'DM Sans', sans-serif; color: white; overflow-x: hidden; scroll-behavior: smooth; }
        .outfit { font-family: 'Outfit', sans-serif; }
        [x-cloak] { display: none !important; }

        .glass-card { 
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 255, 133, 0.15);
        }

        .skeleton {
            background: linear-gradient(90deg, #161d2b 25%, #1f2937 50%, #161d2b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .sidebar-gradient {
            background: linear-gradient(to bottom, #0d1321, #0a0f1a);
            border-left: 1px solid rgba(0, 255, 133, 0.2);
        }

        /* Animated Menu Icons */
        .menu-icon-anim { transition: transform 0.3s ease; }
        .group:hover .menu-icon-anim { animation: heartBeat 1s infinite; }

        .fade-in-scroll { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
        .fade-in-scroll.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body x-data="homeApp()" x-init="init()" class="pb-10">

    <div x-show="loading" class="fixed inset-0 z-[100] bg-[#0a0f1a] p-6 space-y-6">
        <div class="flex justify-between items-center mb-10">
            <div class="h-10 w-32 skeleton rounded-lg"></div>
            <div class="h-10 w-10 skeleton rounded-full"></div>
        </div>
        <div class="h-96 w-full skeleton rounded-[2.5rem]"></div>
        <div class="h-96 w-full skeleton rounded-[2.5rem]"></div>
    </div>

    <header class="bg-[#0a0f1a] border-b border-[#00ff8526] sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="leading-none">
                <span class="outfit text-white text-2xl font-[900] tracking-tighter uppercase">DLS<span class="text-[#00ff85]">26</span></span>
                <span class="block text-[10px] tracking-[0.4em] font-bold text-[#00ff85] opacity-80 uppercase">Friendly</span>
            </div>

            <button @click="menuOpen = true" class="p-2 group">
                <div class="space-y-1.5">
                    <span class="block w-6 h-0.5 bg-[#00ff85]"></span>
                    <span class="block w-6 h-0.5 bg-[#00ff85]"></span>
                    <span class="block w-4 h-0.5 bg-[#00ff85] ml-auto"></span>
                </div>
            </button>
        </div>
    </header>

    <div x-show="menuOpen" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="translate-x-full"
         class="fixed inset-y-0 right-0 w-[70%] max-w-[280px] sidebar-gradient z-[60] shadow-2xl p-6 flex flex-col" x-cloak>
        
        <div class="flex justify-end mb-4">
            <button @click="menuOpen = false" class="text-white/40 hover:text-[#00ff85] p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <nav class="space-y-1 flex-grow overflow-y-auto no-scrollbar">
            <template x-for="item in menuItems">
                <a :href="item.link" 
                   x-show="item.adminOnly ? isAdmin : true"
                   class="flex items-center space-x-3 p-3 rounded-xl hover:bg-[#00ff850a] border border-transparent hover:border-[#00ff8522] transition-all group">
                    <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-[#00ff85] menu-icon-anim" x-html="item.icon"></div>
                    <span class="font-bold text-xs tracking-wide text-white/70 group-hover:text-white" x-text="item.name"></span>
                </a>
            </template>
        </nav>

        <div class="border-t border-white/5 pt-6 mt-4">
            <button @click="logout()" class="flex items-center space-x-3 p-3 w-full text-red-500 hover:bg-red-500/5 rounded-xl transition-all group">
                <div class="w-8 h-8 flex items-center justify-center group-hover:animate-pulse">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                </div>
                <span class="font-black uppercase text-[9px] tracking-widest">Sign Out</span>
            </button>
            <div class="mt-4 px-3 opacity-40">
                <span class="outfit text-white text-lg font-[900] tracking-tighter uppercase">DLS<span class="text-[#00ff85]">26</span></span>
                <p class="text-[7px] tracking-[0.3em] font-bold text-[#00ff85] uppercase">Friendly</p>
            </div>
        </div>
    </div>

    <div x-show="menuOpen" @click="menuOpen = false" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[55]" x-cloak></div>

    <main class="max-w-4xl mx-auto p-6" x-show="!loading">
        <div class="mb-10">
            <h1 class="outfit font-[900] text-3xl uppercase tracking-tighter italic">Operational <span class="text-[#00ff85]">Sectors</span></h1>
            <p class="text-white/30 text-[10px] font-black uppercase tracking-[.3em] mt-2">Central Registry Feed</p>
        </div>

        <div class="space-y-10">
            <template x-for="league in leagues" :key="league.id">
                <div class="glass-card rounded-[2.5rem] overflow-hidden border-t-4 border-t-[#00ff85] fade-in-scroll visible">
                    
                    <div class="p-8 bg-[#0d1321]">
                        <div class="flex justify-between items-center mb-6">
                            <div class="flex items-center space-x-2">
                                <div class="bg-[#00ff8515] p-2 rounded-lg">
                                    <svg class="w-4 h-4 text-[#00ff85] animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                </div>
                                <span class="text-[9px] font-black text-[#00ff85] uppercase tracking-widest" x-text="league.category || 'Standard League'"></span>
                            </div>
                            <span class="text-white/20 font-black text-[9px] uppercase tracking-tighter" x-text="'Season ' + league.season_number"></span>
                        </div>

                        <h2 class="outfit font-[900] text-4xl uppercase tracking-tight mb-3" x-text="league.name"></h2>
                        <p class="text-white/40 text-xs leading-relaxed mb-8 font-medium italic" x-text="league.description || 'No operational brief available for this sector.'"></p>

                        <div class="grid grid-cols-3 gap-3 mb-8">
                            <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center">
                                <p class="text-[7px] text-white/30 uppercase font-black mb-1">Prize</p>
                                <p class="text-xs font-black text-[#00ff85]" x-text="league.prize_pool || 'N/A'"></p>
                            </div>
                            <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center">
                                <p class="text-[7px] text-white/30 uppercase font-black mb-1">Status</p>
                                <p class="text-xs font-black text-white uppercase" x-text="league.status"></p>
                            </div>
                            <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center">
                                <p class="text-[7px] text-white/30 uppercase font-black mb-1">Load</p>
                                <p class="text-xs font-black text-white" x-text="league.joined_count + '/' + league.total_slots"></p>
                            </div>
                        </div>

                        <template x-if="league.userRank">
                            <div class="mb-6 py-3 px-5 bg-[#00ff850a] border border-[#00ff8522] rounded-xl flex justify-between items-center">
                                <div class="flex items-center space-x-2">
                                    <svg class="w-3 h-3 text-[#00ff85]" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                                    <span class="text-[9px] font-bold text-[#00ff85] uppercase">Joined & Synced</span>
                                </div>
                                <span class="text-[10px] font-black text-white/40" x-text="'Pos: #' + league.userRank"></span>
                            </div>
                        </template>

                        <button @click="window.location.href = 'league-shortform.html?id=' + league.id" 
                                class="w-full py-5 rounded-2xl outfit font-[900] uppercase tracking-[.2em] transition-all flex items-center justify-center space-x-3"
                                :class="league.userRank ? 'bg-white/5 border border-white/10 text-white' : 'bg-[#00ff85] text-[#0a0f1a] shadow-[0_10px_25px_rgba(0,255,133,0.2)] hover:scale-[1.01]'">
                            <span x-text="league.userRank ? 'View Details' : 'Join League'"></span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <script>
        const _supabase = supabase.createClient('https://irzgzyfscoosvixwvfhx.supabase.co', 'sb_publishable_5WjuPG6Wg96_ySp0DcDuTw_JTGWxSJh');

        function homeApp() {
            return {
                loading: true,
                menuOpen: false,
                isAdmin: false,
                adminId: 'c2185ce2-e803-410a-91a8-ea21aa206b98',
                leagues: [],
                menuItems: [
                    { name: 'Fixtures', link: 'fixtures.html', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2"/></svg>' },
                    { name: 'Standings', link: 'standings.html', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2"/></svg>' },
                    { name: 'Results', link: 'results.html', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4" stroke-width="2.5"/></svg>' },
                    { name: 'Tournaments', link: 'tournaments.html', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 3v4M3 5h4M6 17v4m-2-2h4" stroke-width="2"/></svg>' },
                    { name: 'My Leagues', link: 'myleaguesh.html', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6" stroke-width="2"/></svg>' },
                    { name: 'Insights', link: 'insights.html', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0l-8 8" stroke-width="2"/></svg>' },
                    { name: 'Profile', link: 'profile.html', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"/></svg>' },
                    { name: 'Admin Panel', link: 'adminpanel.html', icon: '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4" stroke-width="2"/></svg>', adminOnly: true }
                ],

                async init() {
                    const { data: { user } } = await _supabase.auth.getUser();
                    if (!user) { window.location.href = 'signin.html'; return; }
                    if (user.id === this.adminId) this.isAdmin = true;

                    await this.fetchLeagues(user.id);
                    this.loading = false;
                },

                async fetchLeagues(userId) {
                    const { data: leaguesData } = await _supabase
                        .from('leagues')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (leaguesData) {
                        this.leagues = await Promise.all(leaguesData.map(async (lg) => {
                            const { count } = await _supabase.from('league_members').select('*', { count: 'exact', head: true }).eq('league_id', lg.id);
                            const { data: member } = await _supabase.from('league_members').select('team_name').eq('league_id', lg.id).eq('user_id', userId).maybeSingle();

                            let rank = null;
                            if (member) {
                                const { data: std } = await _supabase.from('standings').select('team_name').eq('league_id', lg.id).order('points', { ascending: false }).order('gd', { ascending: false });
                                if (std) {
                                    const idx = std.findIndex(s => s.team_name === member.team_name);
                                    if (idx !== -1) rank = idx + 1;
                                }
                            }
                            return { ...lg, joined_count: count || 0, userRank: rank };
                        }));
                    }
                },

                async logout() {
                    await _supabase.auth.signOut();
                    window.location.href = 'signin.html';
                }
            }
        }
    </script>
</body>
                                      </html>
