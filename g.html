<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question ❤️</title>
    <style>
        :root {
            --bg-color: #ffeff7;
            --primary-pink: #ff4d8d;
            --secondary-blue: #a2d2ff;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        #container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 90%;
            transition: all 0.3s ease;
        }

        h1 {
            color: var(--primary-pink);
            margin-bottom: 1rem;
        }

        #expression-img {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
            transition: transform 0.3s;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            min-height: 200px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        #yes-btn {
            background-color: #4caf50;
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            z-index: 10;
        }

        #no-btn {
            background-color: var(--primary-pink);
            color: white;
            position: relative;
        }

        .pop-animation {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .celebration {
            display: none;
            font-size: 2rem;
            color: var(--primary-pink);
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }

        .balloon {
            position: absolute;
            bottom: -100px;
            font-size: 2rem;
            animation: float Up 4s linear forwards;
        }

        @keyframes floatUp {
            to { transform: translateY(-110vh); }
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="expression-img">😊</div>
        
        <h1 id="main-question">Will you be the love of my life?</h1>

        <div id="celebration-zone" class="celebration">
            <h1>I knew you would say Yess!! That's why I love you babe!!😘</h1>
        </div>

        <div class="btn-container" id="interaction-area">
            <button id="yes-btn">Yess, I'll 😍</button>
            <button id="no-btn">No 😤</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const expression = document.getElementById('expression-img');
        const question = document.getElementById('main-question');
        const interactionArea = document.getElementById('interaction-area');
        const celebrationZone = document.getElementById('celebration-zone');

        let clickCount = 0;
        let yesStage = 0;
        const expressions = ["😊", "🤨", "🙄", "😠", "😫", "😭"];
        const yesEmojis = ["😍", "🤨", "🙄", "😤", "😡"];

        noBtn.addEventListener('click', () => {
            clickCount++;
            
            // 1. Shrink No, Grow Yes
            if (clickCount <= 5) {
                let yesScale = 1 + (clickCount * 0.4);
                let noScale = 1 - (clickCount * 0.1);
                
                yesBtn.style.transform = `scale(${yesScale})`;
                noBtn.style.transform = `scale(${noScale})`;
                
                // Change expression and add pop effect
                expression.textContent = expressions[Math.min(clickCount, expressions.length - 1)];
                yesBtn.classList.add('pop-animation');
                setTimeout(() => yesBtn.classList.remove('pop-animation'), 300);

                // Change Yes button emoji based on frustration
                yesBtn.textContent = `Yess, I'll ${yesEmojis[Math.min(clickCount, yesEmojis.length -1)]}`;
            }
        });

        // 2. Make No button run away after 5 clicks
        noBtn.addEventListener('mouseover', () => {
            if (clickCount >= 5) {
                const x = Math.random() * (window.innerWidth - 100);
                const y = Math.random() * (window.innerHeight - 50);
                
                noBtn.style.position = 'absolute';
                noBtn.style.left = x + 'px';
                noBtn.style.top = y + 'px';
            }
        });

        // 3. Yes Button Stages
        yesBtn.addEventListener('click', () => {
            yesStage++;

            if (yesStage === 1) {
                yesBtn.textContent = "Are you sure?? 🙄";
                yesBtn.style.transform = "scale(1.5)";
            } else if (yesStage === 2) {
                yesBtn.textContent = "Hmmm... 🙄";
                yesBtn.style.transform = "scale(2)";
            } else if (yesStage === 3) {
                handleFinalYes();
            }
        });

        function handleFinalYes() {
            question.style.display = 'none';
            interactionArea.style.display = 'none';
            expression.textContent = "🥰";
            celebrationZone.style.display = 'block';
            
            // Create balloons
            for(let i = 0; i < 30; i++) {
                setTimeout(createBalloon, i * 100);
            }
        }

        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.textContent = ['🎈', '❤️', '💖', '✨'][Math.floor(Math.random() * 4)];
            balloon.style.left = Math.random() * 100 + 'vw';
            balloon.style.fontSize = (Math.random() * 20 + 20) + 'px';
            document.body.appendChild(balloon);
            
            setTimeout(() => balloon.remove(), 4000);
        }
    </script>
</body>
</html>
