<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS26 | Knockout Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { background-color: #0a0f1a; font-family: 'DM Sans', sans-serif; color: white; overflow-x: hidden; }
        .outfit { font-family: 'Outfit', sans-serif; }
        .glass-card { background: linear-gradient(160deg, #111827 0%, #0d1321 100%); border: 1px solid rgba(0, 255, 133, 0.1); }
        .bracket-container { display: flex; gap: 60px; padding: 40px 20px; overflow-x: auto; scroll-snap-type: x mandatory; min-height: 80vh; }
        .round-column { flex-shrink: 0; width: 300px; scroll-snap-align: start; display: flex; flex-direction: column; justify-content: space-around; }
        .match-box { position: relative; padding: 16px; border-radius: 20px; border-left: 4px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
        .match-active { border-left-color: #00ff85; background: rgba(0, 255, 133, 0.03); }
        .team-winner { color: #00ff85; font-weight: 900; }
        .team-loser { opacity: 0.3; filter: grayscale(1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="knockoutEngine()" x-init="init()">

    <header class="bg-[#0a0f1a]/80 border-b border-white/5 sticky top-0 z-50 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button @click="window.history.back()" class="p-2 glass-card rounded-lg text-white/40">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="3"/></svg>
                </button>
                <div>
                    <h1 class="outfit text-xl font-900 uppercase tracking-tighter">Tournament <span class="text-[#00ff85]">Brackets</span></h1>
                    <p class="text-[9px] font-black text-white/30 uppercase tracking-[0.3em]" x-text="leagueName"></p>
                </div>
            </div>
            
            <template x-if="isAdmin">
                <button @click="setupTournament()" class="bg-[#00ff85] text-black text-[10px] font-black px-6 py-2.5 rounded-full uppercase tracking-widest hover:scale-105 transition-transform shadow-[0_0_20px_rgba(0,255,133,0.3)]">
                    Setup & Draw
                </button>
            </template>
        </div>
    </header>

    <main>
        <div class="bracket-container no-scrollbar" x-show="!loading">
            <template x-for="round in activeRounds" :key="round">
                <div class="round-column">
                    <div class="text-center mb-10">
                        <span class="text-[11px] font-black text-white/20 uppercase tracking-[0.5em] border-b border-white/5 pb-2" x-text="round"></span>
                    </div>

                    <div class="space-y-12 flex flex-col justify-center h-full">
                        <template x-for="match in getMatchesByRound(round)" :key="match.id">
                            <div class="glass-card match-box" :class="(match.h_score + match.h_score_2 > 0 || match.a_score + match.a_score_2 > 0) ? 'match-active' : ''">
                                
                                <div class="flex justify-between items-center mb-3">
                                    <div class="flex items-center gap-3">
                                        <div class="w-7 h-7 rounded-full bg-white/5 p-1 flex-shrink-0 border border-white/10">
                                            <img :src="match.home_logo || 'https://via.placeholder.com/40'" class="w-full h-full object-contain rounded-full">
                                        </div>
                                        <span class="text-[12px] font-bold uppercase truncate w-32" 
                                              :class="getWinner(match) === 'home' ? 'team-winner' : (getWinner(match) === 'away' ? 'team-loser' : '')"
                                              x-text="match.home_team || 'TBD'"></span>
                                    </div>
                                    <div class="flex gap-2">
                                        <span class="text-[10px] text-white/20 font-bold self-center" x-show="round !== 'Final'" x-text="match.h_score"></span>
                                        <span class="text-[10px] text-white/20 font-bold self-center" x-show="round !== 'Final'" x-text="match.h_score_2"></span>
                                        <span class="text-sm font-black outfit text-[#00ff85]" x-text="match.h_score + match.h_score_2"></span>
                                    </div>
                                </div>

                                <div class="flex justify-between items-center">
                                    <div class="flex items-center gap-3">
                                        <div class="w-7 h-7 rounded-full bg-white/5 p-1 flex-shrink-0 border border-white/10">
                                            <img :src="match.away_logo || 'https://via.placeholder.com/40'" class="w-full h-full object-contain rounded-full">
                                        </div>
                                        <span class="text-[12px] font-bold uppercase truncate w-32" 
                                              :class="getWinner(match) === 'away' ? 'team-winner' : (getWinner(match) === 'home' ? 'team-loser' : '')"
                                              x-text="match.away_team || 'TBD'"></span>
                                    </div>
                                    <div class="flex gap-2">
                                        <span class="text-[10px] text-white/20 font-bold self-center" x-show="round !== 'Final'" x-text="match.a_score"></span>
                                        <span class="text-[10px] text-white/20 font-bold self-center" x-show="round !== 'Final'" x-text="match.a_score_2"></span>
                                        <span class="text-sm font-black outfit text-white/60" x-text="match.a_score + match.a_score_2"></span>
                                    </div>
                                </div>

                                <template x-if="isAdmin && match.home_team && match.away_team">
                                    <button @click="openScoring(match)" class="absolute -right-3 -top-3 bg-[#00ff85] text-black rounded-full p-2 shadow-xl hover:scale-110 transition-transform z-10">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" stroke-width="3"/></svg>
                                    </button>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="scoringMatch" class="fixed inset-0 z-[100] flex items-center justify-center p-6 backdrop-blur-xl bg-black/60" x-cloak>
        <div class="glass-card w-full max-w-sm rounded-[2.5rem] p-8 border-[#00ff8540]">
            <h3 class="outfit font-900 uppercase text-center mb-8 text-sm tracking-widest text-[#00ff85]">Update Match Scores</h3>
            
            <div class="space-y-6 mb-8">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[9px] font-black text-white/20 uppercase tracking-widest mb-3 text-center">First Leg</p>
                    <div class="flex items-center justify-around">
                        <input type="number" x-model="h1" class="w-12 bg-white/5 border border-white/10 rounded-lg py-2 text-center outfit font-black text-lg focus:border-[#00ff85] outline-none">
                        <span class="text-[10px] font-bold text-white/20">VS</span>
                        <input type="number" x-model="a1" class="w-12 bg-white/5 border border-white/10 rounded-lg py-2 text-center outfit font-black text-lg focus:border-[#00ff85] outline-none">
                    </div>
                </div>

                <div class="bg-white/5 p-4 rounded-2xl border border-white/5" x-show="scoringMatch?.round_name !== 'Final'">
                    <p class="text-[9px] font-black text-white/20 uppercase tracking-widest mb-3 text-center">Second Leg</p>
                    <div class="flex items-center justify-around">
                        <input type="number" x-model="h2" class="w-12 bg-white/5 border border-white/10 rounded-lg py-2 text-center outfit font-black text-lg focus:border-[#00ff85] outline-none">
                        <span class="text-[10px] font-bold text-white/20">VS</span>
                        <input type="number" x-model="a2" class="w-12 bg-white/5 border border-white/10 rounded-lg py-2 text-center outfit font-black text-lg focus:border-[#00ff85] outline-none">
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button @click="saveScore()" class="w-full py-4 rounded-2xl font-black bg-[#00ff85] text-[#0a0f1a] uppercase tracking-widest text-xs shadow-lg shadow-[#00ff8520]">Save & Progress</button>
                <button @click="scoringMatch = null" class="w-full py-3 rounded-xl font-bold text-white/30 text-[10px] uppercase">Close</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://irzgzyfscoosvixwvfhx.supabase.co', 'sb_publishable_5WjuPG6Wg96_ySp0DcDuTw_JTGWxSJh');

        function knockoutEngine() {
            return {
                loading: true,
                leagueId: new URLSearchParams(window.location.search).get('id'),
                leagueName: '',
                isAdmin: false,
                adminId: 'c2185ce2-e803-410a-91a8-ea21aa206b98',
                matches: [],
                activeRounds: [],
                scoringMatch: null,
                h1: 0, a1: 0, h2: 0, a2: 0,

                async init() {
                    const { data: { session } } = await _supabase.auth.getSession();
                    this.isAdmin = session?.user?.id === this.adminId;
                    await this.fetchLeagueData();
                    await this.fetchMatches();
                    this.loading = false;
                },

                async fetchLeagueData() {
                    const { data } = await _supabase.from('leagues').select('name').eq('id', this.leagueId).single();
                    if (data) this.leagueName = data.name;
                },

                async fetchMatches() {
                    const { data } = await _supabase.from('knockouts').select('*').eq('league_id', this.leagueId).order('match_group', { ascending: true });
                    if (data && data.length > 0) {
                        this.matches = data;
                        const roundOrder = ['Round of 32', 'Round of 16', 'Quarter-Finals', 'Semi-Finals', 'Final'];
                        const existing = [...new Set(data.map(m => m.round_name))];
                        this.activeRounds = roundOrder.filter(r => existing.includes(r));
                    }
                },

                getWinner(match) {
                    const totalH = (match.h_score || 0) + (match.h_score_2 || 0);
                    const totalA = (match.a_score || 0) + (match.a_score_2 || 0);
                    if (totalH === 0 && totalA === 0) return null;
                    return totalH > totalA ? 'home' : (totalA > totalH ? 'away' : 'draw');
                },

                getMatchesByRound(round) {
                    return this.matches.filter(m => m.round_name === round);
                },

                openScoring(match) {
                    this.scoringMatch = match;
                    this.h1 = match.h_score || 0;
                    this.a1 = match.a_score || 0;
                    this.h2 = match.h_score_2 || 0;
                    this.a2 = match.a_score_2 || 0;
                },

                async setupTournament() {
                    if(!confirm("Create Bracket & Random Draw?")) return;
                    
                    const { data: teams } = await _supabase.from('league_members').select('team_name, logo_url').eq('league_id', this.leagueId).eq('status', 'Approved');
                    if (!teams || teams.length < 2) return alert("Min 2 approved teams required.");

                    await _supabase.from('knockouts').delete().eq('league_id', this.leagueId);

                    const count = teams.length;
                    const rounds = [];
                    if (count > 16) rounds.push({ name: 'Round of 32', m: 16 });
                    if (count > 8) rounds.push({ name: 'Round of 16', m: 8 });
                    if (count > 4) rounds.push({ name: 'Quarter-Finals', m: 4 });
                    if (count > 2) rounds.push({ name: 'Semi-Finals', m: 2 });
                    rounds.push({ name: 'Final', m: 1 });

                    let nextRoundIds = [];
                    for (let i = rounds.length - 1; i >= 0; i--) {
                        const r = rounds[i];
                        const currentRound = [];
                        for (let j = 0; j < r.m; j++) {
                            const matchObj = { league_id: this.leagueId, round_name: r.name, match_group: j + 1 };
                            if (nextRoundIds.length > 0) {
                                matchObj.winner_next_id = nextRoundIds[Math.floor(j / 2)].id;
                                matchObj.next_slot = (j % 2 === 0) ? 'home' : 'away';
                            }
                            const { data } = await _supabase.from('knockouts').insert([matchObj]).select().single();
                            currentRound.push(data);
                        }
                        nextRoundIds = currentRound;
                    }

                    // Perform Draw
                    let shuffled = teams.sort(() => 0.5 - Math.random());
                    const firstRoundMatches = nextRoundIds; 
                    for (let match of firstRoundMatches) {
                        const h = shuffled.pop();
                        const a = shuffled.pop();
                        if (h) await _supabase.from('knockouts').update({ home_team: h.team_name, home_logo: h.logo_url, away_team: a?.team_name || 'BYE', away_logo: a?.logo_url || '' }).eq('id', match.id);
                    }
                    location.reload();
                },

                async saveScore() {
                    const winner = this.getWinner({h_score: parseInt(this.h1), h_score_2: parseInt(this.h2), a_score: parseInt(this.a1), a_score_2: parseInt(this.a2)});
                    const winnerName = winner === 'home' ? this.scoringMatch.home_team : this.scoringMatch.away_team;
                    const winnerLogo = winner === 'home' ? this.scoringMatch.home_logo : this.scoringMatch.away_logo;

                    await _supabase.from('knockouts').update({
                        h_score: this.h1, a_score: this.a1, h_score_2: this.h2, a_score_2: this.a2
                    }).eq('id', this.scoringMatch.id);

                    if (this.scoringMatch.winner_next_id && winner !== 'draw') {
                        const field = this.scoringMatch.next_slot === 'home' ? 
                            { home_team: winnerName, home_logo: winnerLogo } : 
                            { away_team: winnerName, away_logo: winnerLogo };
                        await _supabase.from('knockouts').update(field).eq('id', this.scoringMatch.winner_next_id);
                    }
                    location.reload();
                }
            }
        }
    </script>
</body>
</html>
