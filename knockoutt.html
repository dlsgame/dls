<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS26 | Champions League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { background-color: #0a0f1a; font-family: 'DM Sans', sans-serif; color: white; overflow-x: hidden; }
        .outfit { font-family: 'Outfit', sans-serif; }
        .glass-card { background: linear-gradient(160deg, #111827 0%, #0d1321 100%); border: 1px solid rgba(0, 255, 133, 0.1); }
        .bracket-container { display: flex; gap: 60px; padding: 40px 20px; overflow-x: auto; min-height: 80vh; scrollbar-width: none; }
        .bracket-container::-webkit-scrollbar { display: none; }
        .round-column { flex-shrink: 0; width: 280px; display: flex; flex-direction: column; justify-content: space-around; }
        .match-box { position: relative; padding: 16px; border-radius: 20px; border-left: 4px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
        .match-active { border-left-color: #00ff85; background: rgba(0, 255, 133, 0.03); }
        .team-winner { color: #00ff85; font-weight: 900; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="knockoutEngine()" x-init="init()">

    <header class="bg-[#0a0f1a]/80 border-b border-white/5 sticky top-0 z-50 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex flex-col">
                <h1 class="outfit text-2xl font-900 uppercase tracking-tighter leading-none">DLS<span class="text-[#00ff85]">26</span></h1>
                <p class="text-[10px] font-black text-[#00ff85] uppercase tracking-[0.4em] mt-1">Friendly</p>
            </div>
            
            <div class="flex items-center gap-4">
                <template x-if="isAdmin">
                    <button @click="setupTournament()" class="bg-[#00ff85] text-black text-[9px] font-black px-5 py-2 rounded-full uppercase tracking-widest hover:scale-105 transition-all">
                        Setup Draw
                    </button>
                </template>
                <button @click="window.history.back()" class="p-2.5 glass-card rounded-xl text-white/40 hover:text-[#00ff85] transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div x-show="loading" class="flex flex-col items-center justify-center h-[60vh]">
            <div class="w-12 h-12 border-4 border-[#00ff85]/20 border-t-[#00ff85] rounded-full animate-spin"></div>
        </div>

        <div class="bracket-container" x-show="!loading" x-cloak>
            <template x-for="round in activeRounds" :key="round">
                <div class="round-column">
                    <div class="text-center mb-6">
                        <span class="text-[10px] font-black text-white/20 uppercase tracking-[0.4em] block" x-text="round"></span>
                    </div>

                    <template x-for="match in getMatchesByRound(round)" :key="match.id">
                        <div class="glass-card match-box mb-8" :class="isFinished(match) ? 'match-active' : ''">
                            <div class="flex justify-between items-center mb-3">
                                <div class="flex items-center gap-3">
                                    <img :src="match.home_logo || 'https://via.placeholder.com/40'" class="w-6 h-6 rounded-full bg-white/5 object-contain">
                                    <span class="text-[11px] font-bold uppercase truncate w-28" 
                                          :class="getWinnerStatus(match) === 'home' ? 'team-winner' : ''"
                                          x-text="match.home_team || 'TBD'"></span>
                                </div>
                                <div class="flex gap-1.5 items-center">
                                    <span class="text-[9px] text-white/20 font-black" x-show="round !== 'Final'" x-text="match.h_score || 0"></span>
                                    <span class="text-[9px] text-white/20 font-black" x-show="round !== 'Final'" x-text="match.h_score_2 || 0"></span>
                                    <span class="text-xs font-black outfit text-[#00ff85]" x-text="(match.h_score||0) + (match.h_score_2||0)"></span>
                                </div>
                            </div>

                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-3">
                                    <img :src="match.away_logo || 'https://via.placeholder.com/40'" class="w-6 h-6 rounded-full bg-white/5 object-contain">
                                    <span class="text-[11px] font-bold uppercase truncate w-28" 
                                          :class="getWinnerStatus(match) === 'away' ? 'team-winner' : ''"
                                          x-text="match.away_team || 'TBD'"></span>
                                </div>
                                <div class="flex gap-1.5 items-center">
                                    <span class="text-[9px] text-white/20 font-black" x-show="round !== 'Final'" x-text="match.a_score || 0"></span>
                                    <span class="text-[9px] text-white/20 font-black" x-show="round !== 'Final'" x-text="match.a_score_2 || 0"></span>
                                    <span class="text-xs font-black outfit text-white/40" x-text="(match.a_score||0) + (match.a_score_2||0)"></span>
                                </div>
                            </div>

                            <template x-if="isAdmin && match.home_team && match.away_team">
                                <button @click="openScoring(match)" class="absolute -right-3 -top-3 bg-[#00ff85] text-black rounded-full p-2 shadow-xl hover:scale-110 transition-transform">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2.5 2.5 0 113.536 3.536L12 21.036H8v-4z"/></svg>
                                </button>
                            </template>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </main>

    <div x-show="scoringMatch" class="fixed inset-0 z-[100] flex items-center justify-center p-6 backdrop-blur-xl bg-black/60" x-cloak>
        <div class="glass-card w-full max-w-sm rounded-[2.5rem] p-8 border-[#00ff8540]">
            <h3 class="outfit font-900 uppercase text-center mb-6 text-xs tracking-widest text-[#00ff85]">Submit CL Scores</h3>
            
            <div class="space-y-4 mb-8">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[8px] font-black text-white/20 uppercase tracking-widest mb-3 text-center">Leg 1 (At Home)</p>
                    <div class="flex items-center justify-around">
                        <input type="number" x-model="h1" class="w-14 bg-black/40 border border-white/10 rounded-xl py-2 text-center outfit font-black text-xl">
                        <span class="text-[10px] font-bold text-white/10">-</span>
                        <input type="number" x-model="a1" class="w-14 bg-black/40 border border-white/10 rounded-xl py-2 text-center outfit font-black text-xl">
                    </div>
                </div>

                <div class="bg-white/5 p-4 rounded-2xl border border-white/5" x-show="scoringMatch?.round_name !== 'Final'">
                    <p class="text-[8px] font-black text-white/20 uppercase tracking-widest mb-3 text-center">Leg 2 (Away)</p>
                    <div class="flex items-center justify-around">
                        <input type="number" x-model="h2" class="w-14 bg-black/40 border border-white/10 rounded-xl py-2 text-center outfit font-black text-xl">
                        <span class="text-[10px] font-bold text-white/10">-</span>
                        <input type="number" x-model="a2" class="w-14 bg-black/40 border border-white/10 rounded-xl py-2 text-center outfit font-black text-xl">
                    </div>
                </div>
            </div>

            <button @click="saveScore()" class="w-full py-4 rounded-2xl font-black bg-[#00ff85] text-black uppercase tracking-widest text-[10px]">Confirm Result</button>
            <button @click="scoringMatch = null" class="w-full py-3 text-white/20 font-bold uppercase text-[9px] mt-2">Cancel</button>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://irzgzyfscoosvixwvfhx.supabase.co', 'sb_publishable_5WjuPG6Wg96_ySp0DcDuTw_JTGWxSJh');

        function knockoutEngine() {
            return {
                loading: true,
                leagueId: new URLSearchParams(window.location.search).get('id'),
                isAdmin: false,
                adminId: 'c2185ce2-e803-410a-91a8-ea21aa206b98',
                matches: [],
                activeRounds: [],
                scoringMatch: null,
                h1: 0, a1: 0, h2: 0, a2: 0,

                async init() {
                    const { data: { session } } = await _supabase.auth.getSession();
                    this.isAdmin = session?.user?.id === this.adminId;
                    await this.fetchMatches();
                    this.loading = false;
                },

                async fetchMatches() {
                    const { data } = await _supabase.from('knockouts').select('*').eq('league_id', this.leagueId).order('match_group', { ascending: true });
                    if (data && data.length > 0) {
                        this.matches = data;
                        const order = ['Round of 16', 'Quarter-Finals', 'Semi-Finals', 'Final'];
                        const existing = [...new Set(data.map(m => m.round_name))];
                        this.activeRounds = order.filter(r => existing.includes(r));
                    }
                },

                isFinished(m) {
                    return (m.h_score + m.h_score_2 + m.a_score + m.a_score_2) > 0;
                },

                getWinnerStatus(m) {
                    const hTotal = (m.h_score || 0) + (m.h_score_2 || 0);
                    const aTotal = (m.a_score || 0) + (m.a_score_2 || 0);
                    if (hTotal === 0 && aTotal === 0) return null;

                    if (hTotal > aTotal) return 'home';
                    if (aTotal > hTotal) return 'away';

                    // AWAY GOALS RULE: If aggregate tied, check away goals in 2nd leg
                    // a_score_2 (Away team playing at Home's stadium)
                    if (hTotal === aTotal) {
                        if (m.a_score_2 > m.h_score) return 'away';
                        if (m.h_score > m.a_score_2) return 'home';
                    }
                    return 'draw';
                },

                getMatchesByRound(round) {
                    return this.matches.filter(m => m.round_name === round);
                },

                openScoring(match) {
                    this.scoringMatch = match;
                    this.h1 = match.h_score || 0; this.a1 = match.a_score || 0;
                    this.h2 = match.h_score_2 || 0; this.a2 = match.a_score_2 || 0;
                },

                async setupTournament() {
                    if(!confirm("Generate Brackets? Teams from same leagues will not be paired.")) return;
                    
                    const { data: teams } = await _supabase.from('league_members')
                        .select('team_name, logo_url, previous_league_id')
                        .eq('league_id', this.leagueId)
                        .eq('status', 'Approved');

                    if (!teams || teams.length < 4) return alert("Min 4 approved teams required.");

                    await _supabase.from('knockouts').delete().eq('league_id', this.leagueId);

                    const rounds = [];
                    if (teams.length > 8) rounds.push({ name: 'Round of 16', m: 8 });
                    if (teams.length > 4) rounds.push({ name: 'Quarter-Finals', m: 4 });
                    if (teams.length > 2) rounds.push({ name: 'Semi-Finals', m: 2 });
                    rounds.push({ name: 'Final', m: 1 });

                    // Create Structure
                    let nextRoundIds = [];
                    for (let i = rounds.length - 1; i >= 0; i--) {
                        const r = rounds[i];
                        const roundMatches = [];
                        for (let j = 0; j < r.m; j++) {
                            const obj = { league_id: this.leagueId, round_name: r.name, match_group: j + 1 };
                            if (nextRoundIds.length > 0) {
                                obj.winner_next_id = nextRoundIds[Math.floor(j/2)].id;
                                obj.next_slot = (j % 2 === 0) ? 'home' : 'away';
                            }
                            const { data } = await _supabase.from('knockouts').insert([obj]).select().single();
                            roundMatches.push(data);
                        }
                        nextRoundIds = roundMatches;
                    }

                    // Smart Pairing Logic: No same-league matchups
                    let potA = []; let potB = [];
                    const groups = {};
                    teams.forEach(t => {
                        const lid = t.previous_league_id || 'unknown';
                        if(!groups[lid]) groups[lid] = [];
                        groups[lid].push(t);
                    });

                    // Distribute across Pots
                    Object.values(groups).forEach(grp => {
                        grp.forEach((team, idx) => {
                            if(idx % 2 === 0) potA.push(team);
                            else potB.push(team);
                        });
                    });

                    potA = potA.sort(() => 0.5 - Math.random());
                    potB = potB.sort(() => 0.5 - Math.random());

                    for (let match of nextRoundIds) {
                        const h = potA.pop() || potB.pop();
                        const a = potB.pop() || potA.pop();
                        if (h) {
                            await _supabase.from('knockouts').update({ 
                                home_team: h.team_name, home_logo: h.logo_url, 
                                away_team: a?.team_name || 'BYE', away_logo: a?.logo_url || '' 
                            }).eq('id', match.id);
                        }
                    }
                    location.reload();
                },

                async saveScore() {
                    // Calculate Winner with Away Goals
                    const stats = { h_score: parseInt(this.h1), a_score: parseInt(this.a1), h_score_2: parseInt(this.h2), a_score_2: parseInt(this.a2) };
                    const winSide = this.getWinnerStatus(stats);
                    
                    const winnerName = winSide === 'home' ? this.scoringMatch.home_team : this.scoringMatch.away_team;
                    const winnerLogo = winSide === 'home' ? this.scoringMatch.home_logo : this.scoringMatch.away_logo;

                    // 1. Update Knockout Table
                    await _supabase.from('knockouts').update(stats).eq('id', this.scoringMatch.id);

                    // 2. Submit to Results Table (Leg 1 & Leg 2)
                    const resultsPayload = [
                        { home_name: this.scoringMatch.home_team, h_score: this.h1, away_name: this.scoringMatch.away_team, a_score: this.a1, league_id: this.leagueId },
                    ];
                    if(this.scoringMatch.round_name !== 'Final') {
                        resultsPayload.push({ home_name: this.scoringMatch.away_team, h_score: this.a2, away_name: this.scoringMatch.home_team, a_score: this.h2, league_id: this.leagueId });
                    }
                    await _supabase.from('results').insert(resultsPayload);

                    // 3. Progress Winner
                    if (this.scoringMatch.winner_next_id && winSide !== 'draw') {
                        const progress = this.scoringMatch.next_slot === 'home' ? 
                            { home_team: winnerName, home_logo: winnerLogo } : 
                            { away_team: winnerName, away_logo: winnerLogo };
                        await _supabase.from('knockouts').update(progress).eq('id', this.scoringMatch.winner_next_id);
                    }
                    location.reload();
                }
            }
        }
    </script>
</body>
  </html>
