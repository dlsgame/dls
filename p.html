<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Mobile 26 | Tournament Bracket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at 50% 35%, #1c003d 0%, #090014 100%);
            font-family: 'Rajdhani', sans-serif;
            color: #ffffff;
            overflow-x: auto;
            min-width: 1280px;
        }
        .fc-title {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Custom Authentic Glassmorphism */
        .fc-glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.07);
        }
        /* Team Row Pill Shapes matching the screenshot geometry */
        .fc-team-pill {
            background: linear-gradient(90deg, rgba(46, 14, 87, 0.5) 0%, rgba(21, 5, 43, 0.7) 100%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.2s ease;
        }
        .fc-team-pill.winner-active {
            background: linear-gradient(90deg, rgba(0, 255, 117, 0.15) 0%, rgba(0, 255, 117, 0.03) 100%);
            border-color: rgba(0, 255, 117, 0.3);
        }
        .fc-team-pill.user-owned {
            background: linear-gradient(90deg, #00ff75 0%, #00b352 100%);
            color: #000000;
            box-shadow: 0 0 20px rgba(0, 255, 117, 0.3);
            border-color: #00ff75;
        }
        .fc-team-pill.user-owned .team-name {
            color: #000000 !important;
            font-weight: 800;
        }
        .fc-team-pill.user-owned .score-display {
            background: rgba(0, 0, 0, 0.15);
            color: #000000;
        }
        /* Curved geometric badge container */
        .fc-badge-shape {
            clip-path: polygon(0% 0%, 100% 0%, 85% 100%, 0% 100%);
            background: rgba(255, 255, 255, 0.1);
        }
        .right-wing .fc-badge-shape {
            clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 0% 100%);
        }
        /* Custom score presentation box */
        .score-display {
            font-family: 'Orbitron', sans-serif;
            background: rgba(0, 0, 0, 0.3);
            color: #00ff75;
        }
        .score-display.dimmed {
            color: rgba(255, 255, 255, 0.2);
        }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="knockoutEngine()" x-init="init()" class="h-full p-4 selection:bg-[#00ff75] selection:text-black">

    <header class="max-w-7xl mx-auto mb-6 flex justify-between items-center p-4 rounded-2xl fc-glass">
        <div class="flex items-center gap-4">
            <a href="home.html" class="w-10 h-10 bg-black/30 rounded-full flex items-center justify-center border border-white/10 hover:border-[#00ff75] transition-all">
                <span class="text-lg font-bold">&larr;</span>
            </a>
            <div>
                <h1 id="tournament-title" class="text-xl md:text-2xl font-black fc-title tracking-tight text-white flex items-center gap-2">
                    <span x-text="leagueName || 'THE WORLD\'S GAME TOURNAMENT'">LOADING TOURNAMENT</span>
                </h1>
                <div class="flex gap-3 text-[10px] font-bold text-gray-400 mt-0.5 tracking-widest uppercase">
                    <span class="text-[#00ff75]">Round of 16</span> &bull; <span>Quarter-Finals</span> &bull; <span>Semi-Finals</span> &bull; <span class="text-white">Grand Final</span>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <template x-if="isAdmin">
                <button @click="setupTournament()" class="bg-[#00ff75] text-black text-xs font-black px-5 py-2 rounded-full uppercase tracking-wider hover:scale-105 transition-all shadow-[0_0_15px_rgba(0,255,117,0.2)]">
                    Setup New Draw
                </button>
            </template>
            <div class="px-4 py-1.5 rounded-full border text-[10px] font-black tracking-widest" :class="isAdmin ? 'border-red-500/30 bg-red-950/20 text-red-400' : 'border-white/10 bg-white/5 text-gray-400'">
                <span x-text="isAdmin ? 'ADMIN CONTROL ACTIVE' : 'VIEWER MODE'"></span>
            </div>
        </div>
    </header>

    <div x-show="loading" class="max-w-7xl mx-auto p-12 text-center fc-glass rounded-3xl">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-t-[#00ff75] border-white/10 mb-4"></div>
        <p class="text-sm font-bold uppercase tracking-widest text-gray-400">Syncing Tournament Database...</p>
    </div>

    <main x-show="!loading" x-cloak class="max-w-[1400px] mx-auto grid grid-cols-7 gap-x-4 gap-y-2 items-center justify-center py-4">

                            <div class="fc-badge-shape w-10 h-full flex items-center justify-center pr-2"><img class="w-5 h-5 object-contain" :src="match.home_logo || 'https://via.placeholder.com/24'" @error="$el.src='https://via.placeholder.com/24'"></div>
                            <span class="font-bold text-xs truncate team-name text-white/80" x-text="match.home_team || 'TBD'"></span>
                        </div>
                        <span class="score-display w-7 h-7 rounded-lg flex items-center justify-center text-xs font-black" :class="!isFinished(match)?'dimmed':''" x-text="isFinished(match) ? ((match.h_score||0)+(match.h_score_2||0)) : '-'"></span>

                    <div class="fc-team-pill flex items-center justify-between h-10 rounded-xl overflow-hidden pl-2 flex-row-reverse" :class="[getWinnerStatus(match)==='home' ? 'winner-active':'', match.home_team===userTeamName ? 'user-owned':'']">
                        <div class="flex items-center gap-2 overflow-hidden h-full flex-row-reverse">
                            <div class="fc-badge-shape w-10 h-full flex items-center justify-center pl-2"><img class="w-5 h-5 object-contain" :src="match.home_logo || 'https://via.placeholder.com/24'"></div>
                            <span class="font-bold text-xs truncate team-name text-white/80 text-right" x-text="match.home_team || 'TBD'"></span>
                        </div>
                        <span class="score-display w-7 h-7 rounded-lg flex items-center justify-center text-xs font-black" :class="!isFinished(match)?'dimmed':''" x-text="isFinished(match) ? ((match.h_score||0)+(match.h_score_2||0)) : '-'"></span>
                    </div>
                    <div class="fc-team-pill flex items-center justify-between h-10 rounded-xl overflow-hidden pl-2 flex-row-reverse" :class="[getWinnerStatus(match)==='away' ? 'winner-active':'', match.away_team===userTeamName ? 'user-owned':'']">
                        <div class="flex items-center gap-2 overflow-hidden h-full flex-row-reverse">
                            <div class="fc-badge-shape w-10 h-full flex items-center justify-center pl-2"><img class="w-5 h-5 object-contain" :src="match.away_logo || 'https://via.placeholder.com/24'"></div>
                            <span class="font-bold text-xs truncate team-name text-white/80 text-right" x-text="match.away_team || 'TBD'"></span>
                        </div>
                        <span class="score-display w-7 h-7 rounded-lg flex items-center justify-center text-xs font-black" :class="!isFinished(match)?'dimmed':''" x-text="isFinished(match) ? ((match.a_score||0)+(match.a_score_2||0)) : '-'"></span>
                    </div>
                    <template x-if="isAdmin && match.home_team && match.away_team">
                        <button @click="openScoring(match)" class="absolute -top-2 -left-2 bg-[#00ff75] text-black rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2.5 2.5 0 113.536 3.536L12 21.036H8v-4z"/></svg></button>
                    </template>
                </div>
            </template>
        </div>
    </main>

    <div x-show="scoringMatch" class="fixed inset-0 z-[100] flex items-center justify-center p-6 backdrop-blur-2xl bg-black/70 animate-fade-in" x-cloak x-transition>
        <div class="fc-glass w-full max-w-md rounded-[2.5rem] p-8 border-[#00ff75]/30 shadow-[0_0_50px_rgba(0,255,117,0.15)]">
            <div class="flex justify-between items-center mb-6">
                <div class="text-center flex-1">
                    <img :src="scoringMatch?.home_logo || 'https://via.placeholder.com/48'" class="w-14 h-14 mx-auto rounded-full mb-2 border border-white/10 p-1 bg-black/40">
                    <p class="text-xs font-black uppercase tracking-wider truncate text-white" x-text="scoringMatch?.home_team"></p>
                </div>
                <div class="px-4 font-black text-[#00ff75] italic tracking-widest fc-title text-sm">VS</div>
                <div class="text-center flex-1">
                    <img :src="scoringMatch?.away_logo || 'https://via.placeholder.com/48'" class="w-14 h-14 mx-auto rounded-full mb-2 border border-white/10 p-1 bg-black/40">
                    <p class="text-xs font-black uppercase tracking-wider truncate text-white" x-text="scoringMatch?.away_team"></p>
                </div>
            </div>
            
            <div class="space-y-4 mb-6">
                <div class="bg-black/30 p-4 rounded-2xl border border-white/5">
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-2 text-center">Leg 1 Scoreline</p>
                    <div class="flex items-center justify-around">
                        <input type="number" x-model.number="h1" class="w-16 bg-black/60 border border-white/10 rounded-xl py-2 text-center font-bold text-xl outline-none text-[#00ff75] focus:border-[#00ff75]">
                        <input type="number" x-model.number="a1" class="w-16 bg-black/60 border border-white/10 rounded-xl py-2 text-center font-bold text-xl outline-none text-[#00ff75] focus:border-[#00ff75]">
                    </div>
                </div>
                <div class="bg-black/30 p-4 rounded-2xl border border-white/5" x-show="scoringMatch?.round_name !== 'Final'">
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-2 text-center">Leg 2 Scoreline</p>
                    <div class="flex items-center justify-around">
                        <input type="number" x-model.number="h2" class="w-16 bg-black/60 border border-white/10 rounded-xl py-2 text-center font-bold text-xl outline-none text-[#00ff75] focus:border-[#00ff75]">
                        <input type="number" x-model.number="a2" class="w-16 bg-black/60 border border-white/10 rounded-xl py-2 text-center font-bold text-xl outline-none text-[#00ff75] focus:border-[#00ff75]">
                    </div>
                </div>
            </div>

            <button @click="saveScore()" class="w-full py-3.5 rounded-xl font-black bg-[#00ff75] text-black uppercase tracking-widest text-xs shadow-[0_0_15px_rgba(0,255,117,0.3)] hover:scale-[1.02] active:scale-95 transition-all">
                Publish Official Result
            </button>
            <button @click="scoringMatch = null" class="w-full py-2.5 text-gray-500 hover:text-white font-bold uppercase text-[10px] mt-2 tracking-wider transition-colors">
                Discard Changes
            </button>
        </div>
    </div>

<script>
    // Initialize Supabase client using your exact project identifiers
    const _supabase = supabase.createClient('https://irzgzyfscoosvixwvfhx.supabase.co', 'sb_publishable_5WjuPG6Wg96_ySp0DcDuTw_JTGWxSJh');

    function knockoutEngine() {
        return {
            loading: true,
            leagueId: new URLSearchParams(window.location.search).get('id') || "1", // Fallback parameter check
            leagueName: '',
            isAdmin: false,
            adminId: 'c2185ce2-e803-410a-91a8-ea21aa206b98', // Specified admin identity verification key
            user: null,
            userTeamName: '',
            matches: [],
            scoringMatch: null,
            h1: 0, a1: 0, h2: 0, a2: 0,

            async init() {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session) {
                    this.user = session.user;
                    this.isAdmin = (this.user.id === this.adminId);

                    const { data: ui } = await _supabase
                        .from('userinfo')
                        .select('team_name')
                        .eq('id', this.user.id)
                        .maybeSingle();
                    if (ui) this.userTeamName = ui.team_name;
                } else {
                    // Graceful fallback for layout configuration previewing
                    this.isAdmin = true; 
                }

                await this.fetchTournamentMeta();
                await this.fetchMatches();
                this.loading = false;
            },

            async fetchTournamentMeta() {
                const { data } = await _supabase
                    .from('leagues')
                    .select('name')
                    .eq('id', this.leagueId)
                    .maybeSingle();
                if (data) this.leagueName = data.name.toUpperCase();
            },
            async fetchMatches() {
                const { data: bracketData } = await _supabase
                    .from('knockouts')
                    .select('*')
                    .eq('league_id', this.leagueId)
                    .order('match_group', { ascending: true });

                const { data: resultsData } = await _supabase
                    .from('results')
                    .select('*')
                    .eq('league_id', this.leagueId);

                if (bracketData) {
                    this.matches = bracketData.map(match => {
                        if (!match.home_team || !match.away_team) return match;
                        const leg1 = resultsData?.find(r => r.home_name === match.home_team && r.away_name === match.away_team);
                        const leg2 = resultsData?.find(r => r.home_name === match.away_team && r.away_name === match.home_team);
                        return {
                            ...match,
                            h_score: leg1 ? parseFloat(leg1.h_score) : 0,
                            a_score: leg1 ? parseFloat(leg1.a_score) : 0,
                            h_score_2: leg2 ? parseFloat(leg2.h_score) : 0, 
                            a_score_2: leg2 ? parseFloat(leg2.a_score) : 0
                        };
                    });
                }
            },

            isFinished(m) {
                return ((m.h_score||0) + (m.h_score_2||0) + (m.a_score||0) + (m.a_score_2||0)) > 0;
            },

            getWinnerStatus(m) {
                const hTot = (parseFloat(m.h_score) || 0) + (parseFloat(m.h_score_2) || 0);
                const aTot = (parseFloat(m.a_score) || 0) + (parseFloat(m.a_score_2) || 0);
                if (hTot === 0 && aTot === 0) return null;
                if (hTot > aTot) return 'home';
                if (aTot > hTot) return 'away';
                return 'draw';
            },

            getMatchesByRound(round) { 
                return this.matches.filter(m => m.round_name === round);
            },

            getLeftMatches(round) {
                const all = this.getMatchesByRound(round);
                return all.slice(0, Math.ceil(all.length / 2));
            },

            getRightMatches(round) {
                const all = this.getMatchesByRound(round);
                return all.slice(Math.ceil(all.length / 2));
            },

            getChampion() {
                const finals = this.getMatchesByRound('Final');
                if (!finals.length) return null;
                const m = finals[0];
                const w = this.getWinnerStatus(m);
                if (w === 'home') return m.home_team;
                if (w === 'away') return m.away_team;
                return null;
            },

            openScoring(match) {
                this.scoringMatch = match;
                this.h1 = match.h_score; this.a1 = match.a_score;
                this.h2 = match.h_score_2; this.a2 = match.a_score_2;
            },

            async saveScore() {
                const stats = { h_score: this.h1, a_score: this.a1, h_score_2: this.h2, a_score_2: this.a2 };
                const winSide = this.getWinnerStatus(stats);
                
                // Clear out legacy entries for this matchup sequence
                await _supabase.from('results').delete().eq('league_id', this.leagueId)
                    .or(`and(home_name.eq."${this.scoringMatch.home_team}",away_name.eq."${this.scoringMatch.away_team}"),and(home_name.eq."${this.scoringMatch.away_team}",away_name.eq."${this.scoringMatch.home_team}")`);

                const logs = [{ home_name: this.scoringMatch.home_team, h_score: this.h1, away_name: this.scoringMatch.away_team, a_score: this.a1, league_id: this.leagueId }];
                if(this.scoringMatch.round_name !== 'Final') {
                    logs.push({ home_name: this.scoringMatch.away_team, h_score: this.a2, away_name: this.scoringMatch.home_team, a_score: this.h2, league_id: this.leagueId });
                }
                await _supabase.from('results').insert(logs);

                // Advance winner forward into subsequent node slot
                if (this.scoringMatch.winner_next_id && winSide && winSide !== 'draw') {
                    const winnerName = winSide === 'home' ? this.scoringMatch.home_team : this.scoringMatch.away_team;
                    const winnerLogo = winSide === 'home' ? this.scoringMatch.home_logo : this.scoringMatch.away_logo;
                    const field = this.scoringMatch.next_slot === 'home' ? { home_team: winnerName, home_logo: winnerLogo } : { away_team: winnerName, away_logo: winnerLogo };
                    await _supabase.from('knockouts').update(field).eq('id', this.scoringMatch.winner_next_id);
                }
                this.scoringMatch = null;
                await this.fetchMatches();
            },

            async setupTournament() {
                if(!confirm("Are you sure you want to completely clear down and randomize a new structural tournament layout?")) return;
                this.loading = true;
                const { data: teams } = await _supabase.from('league_members').select('*').eq('league_id', this.leagueId).eq('status', 'Approved');
                if (!teams || teams.length < 16) { 
                    this.loading = false; 
                    return alert("A symmetric full-wing visualization requires exactly 16 approved league participants."); 
                }

                await _supabase.from('knockouts').delete().eq('league_id', this.leagueId);
                await _supabase.from('results').delete().eq('league_id', this.leagueId);

                const rounds = [
                    { name: 'Round of 16', m: 8 },
                    { name: 'Quarter-Finals', m: 4 },
                    { name: 'Semi-Finals', m: 2 },
                    { name: 'Final', m: 1 }
                ];

                let nextRoundIds = [];
                for (let i = rounds.length - 1; i >= 0; i--) {
                    const r = rounds[i];
                    const roundMatches = [];
                    for (let j = 0; j < r.m; j++) {
                        const obj = { league_id: this.leagueId, round_name: r.name, match_group: j + 1 };
                        if (nextRoundIds.length > 0) {
                            obj.winner_next_id = nextRoundIds[Math.floor(j/2)].id;
                            obj.next_slot = (j % 2 === 0) ? 'home' : 'away';
                        }
                        const { data } = await _supabase.from('knockouts').insert([obj]).select().single();
                        roundMatches.push(data);
                    }
                    nextRoundIds = roundMatches;
                }

                let pool = [...teams].sort(() => 0.5 - Math.random());
                for (let i = 0; i < nextRoundIds.length; i++) {
                    if (pool.length < 2) break;
                    let h = pool.shift(); let a = pool.shift();
                    await _supabase.from('knockouts').update({ 
                        home_team: h.team_name, home_logo: h.logo_url, 
                        away_team: a.team_name, away_logo: a.logo_url 
                    }).eq('id', nextRoundIds[i].id);
                }
                await this.fetchMatches();
                this.loading = false;
            }
        }
    }
</script>
